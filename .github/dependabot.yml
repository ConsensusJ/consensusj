# To get started with Dependabot version updates, you'll need to specify which
# package ecosystems to update and where the package manifests are located.
# Please see the documentation for all configuration options:
# https://docs.github.com/github/administering-a-repository/configuration-options-for-dependency-updates

version: 2
updates:
  - package-ecosystem: "gradle"
    directory: "/" # Dependabot auto-detects gradle/libs.versions.toml here
    schedule:
      interval: "daily"
    ignore:
      # Limit these families to patch updates within the current major.minor
      - dependency-name: "io.micronaut*"
        update-types: ["version-update:semver-minor", "version-update:semver-major"]
      - dependency-name: "com.fasterxml.jackson*"
        update-types: ["version-update:semver-minor", "version-update:semver-major"]
      - dependency-name: "org.junit*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "org.apache.groovy*"
        update-types: ["version-update:semver-minor", "version-update:semver-major"]
    # Group multi-artifact families that share a version so each bump is one PR.
    groups:
      jackson:
        patterns:
          - "com.fasterxml.jackson*"
      junit:
        patterns:
          - "org.junit*"
      micronaut:
        patterns:
          - "io.micronaut*"
      groovy:
        patterns:
          - "org.apache.groovy*"
      xchange:
        patterns:
          - "org.knowm.xchange*"
      slf4j:
        patterns:
          - "org.slf4j*"
  - package-ecosystem: "nix"
    directory: "/" # Location of package manifests
    schedule:
      interval: "weekly"
