plugins {
    id 'java-library'
}

dependencies {
    api libs.rxjava
    api libs.jeromq

    testImplementation libs.slf4j.jdk14
}

jar {
    manifest {
        attributes  'Implementation-Title': 'ConsensusJ RxJava Wrapper for ZeroMQ ',
                'Implementation-Version': archiveVersion.get()
    }
}
