plugins {
    id 'java-library'
}


dependencies {
    api libs.javamoney.api
    api libs.rxjava
    api libs.xchange.core

    implementation libs.moneta.core
    implementation libs.moneta.convert

    testImplementation project(':consensusj-currency')  // For BTC Currency Code
    testRuntimeOnly libs.xchange.bitfinex
    testRuntimeOnly libs.xchange.itbit
    testRuntimeOnly libs.xchange.coinbase
    testRuntimeOnly libs.xchange.coinbasepro
    testRuntimeOnly libs.xchange.bittrex
}

ext.moduleName = 'org.consensusj.exchange'

jar {
    inputs.property("moduleName", moduleName)
    manifest {
        attributes  'Automatic-Module-Name': moduleName,
                'Implementation-Version': archiveVersion.get()
    }
}

test {
    testLogging.showStandardStreams = true
    systemProperty 'java.util.logging.config.file', "${project.projectDir}/src/test/logging.properties"
    beforeTest { descriptor ->
        logger.lifecycle('    ' + descriptor.getName())
    }
}


