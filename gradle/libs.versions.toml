# Gradle Version Catalog

[versions]
bitcoinj = "0.17.1"
rxjava = "3.1.12"
groovy = "4.0.32"
nullaway = "0.13.1"
junit = "5.14.4"
spock = "2.4-groovy-4.0"
slf4j = "2.0.18"
jackson = "2.21.5"
micronaut = "4.10.17"
javamoneyApi = "1.1"
moneta = "1.4.4"
bytebuddy = "1.18.10"
objenesis = "3.5"
nashorn = "15.7"
jeromq = "0.6.0"
jakartaInject = "2.0.1"
jakartaAnnotation = "3.0.0"
